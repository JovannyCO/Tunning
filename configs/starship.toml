[git_branch]
format = "[î‚¶](fg:#00897B)[ $symbol$branch ]($style)"
style = "bg:#00897B fg:#FFFFFF bold"
symbol = " "
truncation_length = 50

[git_status]
format = "[$all_status$ahead_behind]($style)[î‚´](fg:#00897B)"
style = "bg:#00897B fg:#FFD740 bold"
conflicted  = " "
ahead       = " ${count} "
behind      = " ${count} "
diverged    = " ${ahead_count} ${behind_count} "
untracked   = " "
stashed     = " َ°ڈ—"
modified    = " "
staged      = " "
renamed     = " آ»"
deleted     = " "

[fill]
symbol = "â”€"
