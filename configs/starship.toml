[os]
disabled = false
format = "[ $symbol ](bg:#FF6D00 fg:#1C1B1F bold)"

[os.symbols]
Ubuntu   = ""
Debian   = ""
Windows  = "َ°چ²"
Linux    = ""
Macos    = "َ°€µ"
Unknown  = ""

[username]
show_always = true
format = "[ $user](bg:#FF6D00 fg:#1C1B1F bold)"
style_user = "bg:#FF6D00 fg:#1C1B1F bold"
style_root = "bg:#CF6679 fg:#FFFFFF bold"

[hostname]
ssh_only = false
format = "[@$hostname ](bg:#FF6D00 fg:#1C1B1F bold)"

[directory]
format = "[ َ°‰‹ $path$read_only ]($style)[î‚´](fg:#2B2930)"
style = "bg:#2B2930 fg:#82AAFF bold"
truncation_length = 4
truncate_to_repo = true
read_only = " َ°Œ¾"
